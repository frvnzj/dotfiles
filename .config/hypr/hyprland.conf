#########################
# ENVIRONMENT VARIABLES #
#########################

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

#############
# MONITORES #
#############

# monitor=,preferred,auto,1
monitor=eDP-1,1366x768@60,0x0,1
# monitor=HDMI-A-1,1360x768@60,1920x0,1
# monitor=HDMI-A-1,1680x1050@60,1366x0,1


#########################
# PROGRAMAS EN ARRANQUE #
#########################

exec-once = ~/.config/hypr/scripts/xdg-portal-hyprland
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = swaync
exec-once = waybar
# exec-once = blueman-applet
exec-once = nm-applet --indicator
exec-once = wl-paste --watch cliphist store
exec-once = swww init
exec-once = ~/.config/hypr/scripts/changewall ~/Pictures/wallpapers/
exec-once = ~/.config/hypr/scripts/gtk

source = ~/.config/hypr/rose-pine.conf

#############################
# CONFIGURACIÓN DE HYPRLAND #
#############################

input {
    kb_layout = latam
    repeat_rate = 50
    repeat_delay = 300
    sensitivity = 0.1
    follow_mouse = 1

    touchpad {
    	disable_while_typing = true
        natural_scroll = true
    }
}

general {
    sensitivity = 1

    gaps_in = 5
    gaps_out = 12
    border_size = 1
    # col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    # col.active_border=rgb(cdd6f4)
    # col.inactive_border = rgba(595959aa)
    col.active_border = $pine $base 90deg
    col.inactive_border = $surface

    layout = dwindle
}

misc {
    disable_hyprland_logo = yes
    disable_autoreload=true
}

decoration {
    rounding = 6
    blur = true
    blur_size = 5
    blur_passes = 2
    inactive_opacity = 1

    blurls = lockscreen
    blurls = gtk-layer-shell

    drop_shadow = true
    shadow_range = 10
    shadow_render_power = 2
    shadow_offset = 8 8
    col.shadow=0x44000000
}

animations {
    enabled = true

    # bezier = overshot, 0.13, 0.99, 0.29, 1.1

    # animation = windows, 1, 4, overshot, slide
    # animation = windowsOut, 1, 4, default, popin 80%
    # animation = border, 1, 5, default
    # animation = fade, 1, 8, default
    # animation = workspaces, 1, 6, overshot, slidevert


    bezier = overshot, 0.05, 0.9, 0.1, 1.05
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1

    animation = windows, 1, 5, overshot, slide
    animation = windowsOut, 1, 4, smoothOut, slide
    animation = windowsMove, 1, 4, default
    animation = border, 1, 10, default
    animation = fade, 1, 10, smoothIn
    animation = fadeDim, 1, 10, smoothIn
    animation = workspaces, 1, 6, default
}

dwindle {
    pseudotile = true
    preserve_split = true
}

#master {
#    new_is_master = true
#}

gestures {
    workspace_swipe = true
    workspace_swipe_distance = 250
    workspace_swipe_invert = true
    workspace_swipe_min_speed_to_force = 15
    workspace_swipe_cancel_ratio = 0.5
}


###############
# WINDOWRULES #
###############

windowrule = float,^(pavucontrol)$
windowrule = float,^(blueman-manager)$
windowrule = float,^(nm-connection-editor)$
windowrule = float,^(thunar)$
windowrule = float, title:^(btop)$
windowrule = float, title:^(update-sys)$
windowrule = float, mpv
windowrule = size 80%, mpv
windowrule = center, mpv
windowrule = float, kitty
windowrule = float, wezterm
windowrule = size 70%, pavucontrol
windowrule = size 70%,^(thunar)$
windowrule = center,^(thunar)$
windowrule = center, pavucontrol
windowrule = pin, title:^(video0 - mpv)$
windowrule = size 25%, title:^(video0 - mpv)$
windowrule = move 1020 520, title:^(video0 - mpv)$
windowrule = float, title:^(Firefox - Indicador de compartición)$
windowrule = move 1050 5, title:^(Firefox - Indicador de compartición)$
windowrule = float, zathura
windowrule = size 60%, zathura
windowrule = center, zathura


#####################
# ATAJOS DE TECLADO #
#####################

