#monitor=,preferred,auto,1
monitor=eDP-1,1366x768@60,0x0,1
# monitor=HDMI-A-1,1360x768@60,1920x0,1

input {
  kb_layout=latam
  repeat_rate=50
  repeat_delay=300
  sensitivity=0.1
  follow_mouse=1

  touchpad {
    disable_while_typing=false
    natural_scroll=true 
    clickfinger_behavior=false
    middle_button_emulation=true
    tap-to-click=true
  }
}

gestures {
  workspace_swipe=true
  workspace_swipe_distance=250
  workspace_swipe_invert=true
  workspace_swipe_min_speed_to_force=15
  workspace_swipe_cancel_ratio=0.5
}

general {
  sensitivity=1
  layout=dwindle

  gaps_in=5
  gaps_out=12

  border_size=0
  col.active_border=0xFF5E81AC
  col.inactive_border=0xFF343A40
}

animations {
  enabled=true
  bezier = overshot, 0.13, 0.99, 0.29, 1.1
  animation = windows, 1, 4, overshot, slide
  animation = windowsOut, 1, 5, default, popin 80%
  animation = border, 1, 5, default
  animation = fade, 1, 8, default
  animation = workspaces, 1, 6, overshot, slidevert
}

decoration {
  rounding=4
  blur=true
  blur_size=5
  blur_passes=2
  inactive_opacity=1

  drop_shadow=true
  shadow_range=20
  shadow_render_power=2
  shadow_ignore_window=true
  shadow_offset=8 8
  col.shadow=0x44000000
}

dwindle {
  pseudotile=true # enable pseudotiling on dwindle
  preserve_split=true
}

# master {
#   new_on_top=true
# }

misc {
  disable_hyprland_logo=true
  disable_splash_rendering=true
  mouse_move_enables_dpms=true
  disable_autoreload=true
  enable_swallow=true
}

windowrule=float,rofi
windowrule=float,mpv
windowrule=size 80%,mpv
windowrule=center,mpv
windowrule=float,kitty
windowrule=float,wezterm
windowrule=float,foot
windowrule=noborder,^(firefox)$
windowrule=float,viewnior
windowrule=float,pavucontrol
windowrule=size 70%,pavucontrol
windowrule=center,pavucontrol
windowrule = pin, title:^(video0 - mpv)$
windowrule=size 25%,title:^(video0 - mpv)$
windowrule = move 1020 520, title:^(video0 - mpv)$
windowrule = float, title:^(Firefox - Indicador de compartición)$
windowrule = move 1050 5, title:^(Firefox - Indicador de compartición)$

blurls=lockscreen
blurls=gtk-layer-shell
blurls=notifications
blurls=rofi

