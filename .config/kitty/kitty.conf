# Fonts
font_family       Cascadia Code SemiLight
bold_font         Cascadia Code SemiBold
italic_font       Cascadia Code SemiLight Italic
bold_italic_font  Cascadia Code SemiBold Italic
font_size         13
font_features     CascadiaCode-SemiBoldItalic     +calt +ss01
font_features     CascadiaCode-LightItalic        +calt +ss01
font_features     CascadiaCode-ExtraLightItalic   +calt +ss01
font_features     CascadiaCode-Italic             +calt +ss01
font_features     CascadiaCode-BoldItalic         +calt +ss01
font_features     CascadiaCode-SemiLightItalic    +calt +ss01

# Cursor
cursor_shape                  beam
cursor_beam_thickness         1.5

# allow_remote_control yes
# listen_on unix:@mykitty

# Window
remember_window_size        no
initial_window_width        1250
initial_window_height       650
window_border_width         1px
window_padding_width        5
background_opacity          0.6

# Tabs
tab_bar_edge                bottom
tab_bar_style               powerline
active_tab_font_style       bold
inactive_tab_font_style     normal

map ctrl+shift+right        next_window
map ctrl+shift+left         previous_window


# The basic colors
foreground              #CDD6F4
background              #181825
selection_foreground    #1E1E2E
selection_background    #F5E0DC

# Cursor colors
cursor                  #F5E0DC
cursor_text_color       #1E1E2E

# URL underline color when hovering with mouse
url_color               #F5E0DC

# Kitty window border colors
active_border_color     #B4BEFE
inactive_border_color   #6C7086
bell_border_color       #F9E2AF

# OS Window titlebar colors
wayland_titlebar_color system

# Tab bar colors
active_tab_foreground   #11111B
active_tab_background   #CBA6F7
inactive_tab_foreground #CDD6F4
inactive_tab_background #181825
tab_bar_background      #11111B

# Colors for marks (marked text in the terminal)
mark1_foreground #1E1E2E
mark1_background #B4BEFE
mark2_foreground #1E1E2E
mark2_background #CBA6F7
mark3_foreground #1E1E2E
mark3_background #74C7EC

